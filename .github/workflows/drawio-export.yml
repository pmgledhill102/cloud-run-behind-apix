name: Export draw.io diagrams

on:
  push:
    branches: [main]
    paths:
      - '**.drawio'

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export draw.io to SVG
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs/diagrams
          format: svg
          transparent: true
          action-mode: all

      - name: Rename exported SVGs to match expected paths
        run: |
          sudo chown -R "$(id -u):$(id -g)" docs/diagrams/export
          for drawio_file in docs/diagrams/*.drawio; do
            base="$(basename "$drawio_file" .drawio)"
            svg="$(ls docs/diagrams/export/"${base}"-*.svg 2>/dev/null | head -1)"
            if [ -n "$svg" ]; then
              mv "$svg" "docs/diagrams/${base}.svg"
            fi
          done
          rm -rf docs/diagrams/export

      - name: Commit exported SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-export drawio diagrams to SVG"
          file_pattern: 'docs/diagrams/*.svg'
